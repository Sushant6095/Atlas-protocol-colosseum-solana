[package]
name = "atlas-replay"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Replay + simulation harness. `atlas-replay run` reconstructs a historical rebalance and asserts byte-identity against the archive. `atlas-replay what-if` runs counterfactuals. `atlas-replay fuzz` runs the directive §11 adversarial scenario suite."

[[bin]]
name = "atlas-replay"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
atlas-public-input = { path = "../atlas-public-input" }
atlas-pipeline = { path = "../atlas-pipeline" }
atlas-telemetry = { path = "../atlas-telemetry" }
clap.workspace = true
tokio = { workspace = true, features = ["full"] }
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
serde.workspace = true
serde_json.workspace = true

[dev-dependencies]
proptest = "1.5"
async-trait = "0.1"
