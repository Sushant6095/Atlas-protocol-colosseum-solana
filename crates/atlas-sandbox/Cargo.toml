[package]
name = "atlas-sandbox"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Atlas strategy sandbox — backtests, what-if overlays, A/B comparisons. Implements directive 06 §1."

[lib]

[[bin]]
name = "atlas-sandbox"
path = "src/bin/sandbox.rs"

[dependencies]
atlas-warehouse = { path = "../atlas-warehouse" }
atlas-blackbox = { path = "../atlas-blackbox" }
atlas-failure = { path = "../atlas-failure" }
atlas-capital = { path = "../atlas-capital" }
atlas-telemetry = { path = "../atlas-telemetry" }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["full"] }
tracing.workspace = true
tracing-subscriber.workspace = true
clap.workspace = true
anyhow.workspace = true
blake3.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["full", "macros"] }
proptest = "1.5"
