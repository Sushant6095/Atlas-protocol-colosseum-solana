[package]
name = "atlas-warehouse"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Atlas intelligence warehouse — typed schemas, WarehouseClient trait, point-in-time feature store, Bubblegum anchoring, forensic HTTP API. Implements directive 03."

[lib]

[[bin]]
name = "atlas-warehouse-api"
path = "src/bin/api.rs"

[dependencies]
atlas-public-input = { path = "../atlas-public-input" }
atlas-bus = { path = "../atlas-bus" }
atlas-telemetry = { path = "../atlas-telemetry" }
tokio = { workspace = true, features = ["full"] }
async-trait = "0.1"
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
thiserror.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
blake3.workspace = true
bytes.workspace = true
clap.workspace = true
axum.workspace = true

[dev-dependencies]
proptest = "1.5"
